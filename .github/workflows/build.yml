name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3

    - name: Download Xray and tun2socks
      run: |
        mkdir -p app/src/main/assets

        # Xray для arm64
        wget -q "https://github.com/XTLS/Xray-core/releases/download/v25.4.30/Xray-android-arm64-v8a.zip" -O xray.zip
        unzip -q xray.zip -d xray_tmp
        cp xray_tmp/xray app/src/main/assets/xray
        chmod +x app/src/main/assets/xray

        # tun2socks для arm64
        wget -q "https://github.com/xjasonlyu/tun2socks/releases/latest/download/tun2socks-linux-arm64.zip" -O tun2socks.zip
        unzip -q tun2socks.zip -d tun2socks_tmp
        cp tun2socks_tmp/tun2socks-linux-arm64 app/src/main/assets/tun2socks 2>/dev/null || \
        cp tun2socks_tmp/tun2socks app/src/main/assets/tun2socks 2>/dev/null || true
        chmod +x app/src/main/assets/tun2socks

    - name: Install Gradle 8.2
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip -d $HOME
        echo "$HOME/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Build APK
      run: gradle assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: WaveVPN
        path: app/build/outputs/apk/debug/app-debug.apk
