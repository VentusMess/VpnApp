name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3

    - name: Download Xray
      run: |
        mkdir -p app/src/main/assets
        wget -q "https://github.com/XTLS/Xray-core/releases/download/v25.4.30/Xray-android-arm64-v8a.zip" -O xray.zip
        unzip -q xray.zip -d xray_tmp
        cp xray_tmp/xray app/src/main/assets/xray
        chmod +x app/src/main/assets/xray
        ls -la app/src/main/assets/

    - name: Install Gradle 8.2
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip -d $HOME
        echo "$HOME/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Build APK
      run: gradle assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: WaveVPN
        path: app/build/outputs/apk/debug/app-debug.apk
