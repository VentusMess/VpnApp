name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3

    - - name: Download Xray and hev-socks5-tunnel
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/jniLibs/arm64-v8a
        mkdir -p app/src/main/jniLibs/armeabi-v7a

        # Скачиваем Xray
        wget -q "https://github.com/XTLS/Xray-core/releases/download/v25.4.30/Xray-android-arm64-v8a.zip" -O xray.zip
        unzip -q xray.zip -d xray_tmp
        cp xray_tmp/xray app/src/main/assets/xray
        chmod +x app/src/main/assets/xray

        # Скачиваем hev-socks5-tunnel .so для Android
        wget -q "https://github.com/heiher/hev-socks5-tunnel/releases/download/2.14.4/hev-socks5-tunnel-android-arm64-v8a.so" -O app/src/main/jniLibs/arm64-v8a/libhev.so 2>/dev/null || \
        wget -q "https://github.com/heiher/hev-socks5-tunnel/releases/latest/download/hev-socks5-tunnel-android-arm64-v8a.so" -O app/src/main/jniLibs/arm64-v8a/libhev.so 2>/dev/null || true

        ls -la app/src/main/assets/
        ls -la app/src/main/jniLibs/arm64-v8a/
        if [ -f hev.zip ]; then
          unzip -q hev.zip -d hev_tmp
          find hev_tmp -name "*.so" | head -20
          find hev_tmp -name "*arm64*" -o -name "*arm64-v8a*" | while read f; do
            cp "$f" app/src/main/jniLibs/arm64-v8a/libhev.so 2>/dev/null || true
          done
        fi

        ls -la app/src/main/assets/
        ls -la app/src/main/jniLibs/ 2>/dev/null || true

    - name: Install Gradle 8.2
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip -d $HOME
        echo "$HOME/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Build APK
      run: gradle assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: WaveVPN
        path: app/build/outputs/apk/debug/app-debug.apk
