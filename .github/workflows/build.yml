name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v3

    - name: Download WireGuard tools for Android
      run: |
        mkdir -p app/src/main/assets
        # Скачиваем wireguard-go для Android arm64
        wget -q "https://github.com/WireGuard/wireguard-android/releases/latest/download/wireguard-arm64-v8a.apk" -O wg.apk 2>/dev/null || true
        # Берём бинарник из APK
        if [ -f wg.apk ]; then
          unzip -q wg.apk -d wg_tmp 2>/dev/null || true
          find wg_tmp -name "libwg-go.so" -o -name "libwg.so" | head -1 | xargs -I{} cp {} app/src/main/assets/wireguard 2>/dev/null || true
        fi
        ls -la app/src/main/assets/ || true

    - name: Install Gradle 8.2
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip -d $HOME
        echo "$HOME/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Build APK
      run: gradle assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: WaveVPN
        path: app/build/outputs/apk/debug/app-debug.apk
